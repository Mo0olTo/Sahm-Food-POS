<section class="bg-[var(--color-bg)] min-h-screen">
    <div class="flex min-h-screen">

      <app-sidebar
        class="hidden w-72 shrink-0 md:sticky md:top-0 md:block md:h-screen md:overflow-y-auto"
      ></app-sidebar>

      <div class="flex min-w-0 flex-1 flex-col pb-20 md:pb-0">
        <div class="w-full">
          <app-header></app-header>
        </div>

        <app-workspace class="flex-1"></app-workspace>
      </div>

    </div>

    <app-bottom-nav></app-bottom-nav>

    <!-- Global drawers -->
    <app-new-order
      [open]="isNewOrderDrawerOpen()"
      (close)="closeNewOrderDrawer()">
    </app-new-order>

  </section>
