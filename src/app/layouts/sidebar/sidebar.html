<aside class="flex h-full w-full flex-col border-r border-[var(--color-borders)] bg-[var(--color-section-bg)]">
    <div class="flex w-full flex-col items-center justify-center pt-9 pb-5">

        <!-- Logo -->
        <div class="flex items-center justify-center">
            <img src="/logo-white.png" alt="Sahm Smart Restaurant POS logo" class="h-10 w-auto" />
        </div>

        <!-- Title -->
        <h1 class="mt-3 text-lg font-semibold tracking-wide text-[var(--color-primary)]">
            Smart Restaurant POS
        </h1>

        <!-- Subtitle -->
        <span class="mt-1 text-[11px] uppercase tracking-[0.2em] text-gray-500">
            Operations Console
        </span>
    </div>

    <!-- Primary action -->
    <div class="px-4">
        <button
            type="button"
            (click)="openNewOrder()"
            class="mb-6 flex w-full items-center justify-center gap-2 rounded-xl cursor-pointer
                   bg-[var(--color-primary)] px-4 py-3 text-sm font-semibold text-white
                   shadow-lg shadow-[var(--color-primary)]/10
                   transition hover:brightness-110 active:scale-[0.98]"
            aria-label="Create a new order"
        >
            <i class="pi pi-plus text-base" aria-hidden="true"></i>
            New Order
        </button>
    </div>

    <!-- Navigation group label -->
    <div class="px-5 pb-2 text-[11px] font-semibold uppercase tracking-[0.18em] text-gray-500">
        Workspace
    </div>

    <nav aria-label="Primary navigation" class="flex-1 overflow-y-auto px-2">
        <app-sidebar-nav></app-sidebar-nav>
    </nav>

    <!-- Footer -->
    <div class="mt-auto border-t border-[var(--color-borders)]/60 px-4 py-4">
        <div class="flex items-center gap-3">
            <div class="flex h-9 w-9 items-center justify-center rounded-full bg-[var(--color-primary)]/15 text-sm font-semibold text-[var(--color-primary)]">
                SF
            </div>
            <div class="min-w-0">
                <p class="truncate text-sm font-semibold text-gray-200">Sahm Food</p>
                <p class="text-[11px] text-gray-500">Riyadh · Branch 04</p>
            </div>
        </div>
    </div>
</aside>
