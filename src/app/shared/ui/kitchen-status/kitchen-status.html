<div class="w-full flex items-center gap-4 rounded-xl border border-gray-200 bg-white px-4 py-2 shadow-sm">

    <div class="flex flex-col min-w-[130px]">

        <span class="text-xs font-medium text-gray-500">
            Kitchen
        </span>

        <div class="mt-1 h-2 w-full overflow-hidden rounded-full bg-gray-200">

            <div
                class="h-full rounded-full transition-all duration-500"
                [style.width.%]="kitchen().percentage"
                [ngClass]="progressColor()">
            </div>

        </div>

    </div>

    <div class="text-sm font-semibold text-gray-700">

        {{ kitchen().percentage }}%

    </div>

    <div class="text-xs text-gray-500">

        {{ kitchen().activeOrders }} Orders

    </div>

    <div class="flex flex-col gap-1">

        <span
            class="w-fit rounded-full px-2 py-0.5 text-[11px] font-semibold"
            [ngClass]="levelClass()">
    
            {{ kitchen().level  }}
    
        </span>
    
        <span class="text-xs text-gray-500">
    
            {{ kitchen().activeOrders }} Orders •
            {{ kitchen().estimatedWait }} min
    
        </span>
    
    </div>

</div>
