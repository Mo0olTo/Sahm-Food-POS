<div
  role="status"
  [attr.aria-label]="'Kitchen status: ' + kitchen().level + ' load, ' + kitchen().percentage + ' percent'"
  class="group flex items-center gap-3 rounded-xl border bg-[var(--color-section-bg)] px-3 py-2 transition-all duration-200 hover:border-[var(--color-primary)] sm:gap-4 sm:px-4"
  [class]="theme().border"
>

  <!-- Mini circular gauge -->
  <div class="relative flex h-9 w-9 shrink-0 items-center justify-center sm:h-10 sm:w-10">

    <svg
      class="h-full w-full -rotate-90"
      viewBox="0 0 40 40"
      aria-hidden="true"
    >

      <circle
        cx="20"
        cy="20"
        r="16"
        fill="none"
        stroke-width="3"
        class="transition-colors duration-500"
        [class]="theme().track"
      ></circle>

      <circle
        cx="20"
        cy="20"
        r="16"
        fill="none"
        stroke-width="3"
        stroke-linecap="round"
        class="transition-all duration-700"
        [class]="theme().ring"
        [attr.stroke-dasharray]="dashArray"
        [attr.stroke-dashoffset]="dashOffset()"
      ></circle>

    </svg>

    <span
      class="absolute h-1.5 w-1.5 rounded-full"
      [class]="theme().dot"
      aria-hidden="true"
    ></span>

  </div>

  <!-- Primary metric -->
  <div class="min-w-0">

    <div class="flex items-center gap-1.5">

      <span class="text-[10px] font-semibold uppercase tracking-[0.18em] text-[var(--color-sec-text)]">
        Kitchen
      </span>

      <span
        class="rounded-full px-1.5 py-0.5 text-[9px] font-bold uppercase tracking-wider"
        [class]="theme().chip + ' ' + theme().chipText"
      >
        {{ levelLabel() }}
      </span>

    </div>

    <div class="mt-0.5 flex items-baseline gap-2">

      <span
        class="text-base font-extrabold leading-none tabular-nums transition-colors duration-500 sm:text-lg"
        [class]="theme().text"
      >
        {{ kitchen().percentage }}%
      </span>

      <span class="hidden text-[11px] tabular-nums text-[var(--color-sec-text)] sm:inline">
        ·
        {{ kitchen().activeOrders }} active
      </span>

      <span class="hidden text-[11px] tabular-nums text-[var(--color-sec-text)] md:inline">
        ·
        {{ kitchen().estimatedWait }} min wait
      </span>

    </div>

  </div>

  <!-- Alert badge (only if alerts exist) -->
  @if (kitchen().alerts.length > 0) {

    <span
      class="ml-auto inline-flex h-6 min-w-6 items-center justify-center gap-1 rounded-full bg-red-500/15 px-2 text-[11px] font-bold tabular-nums text-red-400"
      [attr.aria-label]="kitchen().alerts.length + ' active alerts'"
    >

      <i class="pi pi-bell text-[10px]" aria-hidden="true"></i>
      {{ kitchen().alerts.length }}

    </span>

  }

</div>
