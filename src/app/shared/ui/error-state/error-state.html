<div
    class="flex min-h-[16rem] w-full flex-col items-center justify-center gap-3 p-6">

    <h3 class="text-lg font-semibold text-red-500">
        {{ title() }}
    </h3>

    <p class="max-w-md text-center text-gray-400">
        {{ description() }}
    </p>

    <button
        class="mt-2 rounded-lg bg-[var(--color-primary)] px-4 py-2 text-[var(--color-bg)]"
        (click)="retry.emit()">

        Retry

    </button>

</div>
