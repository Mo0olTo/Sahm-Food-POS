<section class="order-board h-full w-full">

  @if (loading()) {

    <app-skeleton
    [rows]="8"
    ></app-skeleton>

} @else if (error()) {

    <app-error-state
        (retry)="reload()">
    </app-error-state>

} @else {

  <div class="grid h-full grid-cols-1 gap-4 xl:grid-cols-9 xl:gap-6">

    <!-- Board -->
    <div class="col-span-1 xl:col-span-9">

      <div class="grid grid-cols-1 gap-4 h-full sm:grid-cols-1 xl:grid-cols-3 xl:gap-6">

        @for (column of columns(); track column.channel) {

          <app-order-column
            [title]="column.title"
            [orders]="column.orders"
            (orderSelected)="onOrderSelected($event)">
          </app-order-column>

        }

      </div>

    </div>

    <!-- Details Panel -->
    <div class="col-span-1 xl:col-span-3 xl:max-h-[calc(100vh-6rem)] xl:sticky xl:top-4">

      @if (detailsOpen()) {

        <div class="fixed inset-0 z-50 flex">
        
        
            <!-- Overlay -->
            <div
                class="flex-1 bg-black/40 backdrop-blur-sm"
                (click)="closeDetails()">
            </div>
        
        
        
            <!-- Drawer -->
            <aside
    class="flex h-full w-[450px] flex-col border-l border-[var(--color-borders)] bg-[var(--color-section-bg)] shadow-2xl">

    <!-- Header -->
    <div
        class="flex items-center justify-between border-b border-[var(--color-borders)] px-6 py-5">

        <h2
            class="text-xl font-bold text-[var(--color-main-text)]">

            Order Details

        </h2>

        <button
            type="button"
            (click)="closeDetails()"
            class="rounded-lg p-2 text-[var(--color-sec-text)] transition-colors duration-200 hover:bg-[var(--color-bg)] hover:text-[var(--color-primary)]">

            <i class="pi pi-times text-lg"></i>

        </button>

    </div>

    <!-- Content -->
    <div
        class="flex-1 overflow-y-auto bg-[var(--color-section-bg)] p-6">

        <app-order-details
            [order]="selectedOrder()">
        </app-order-details>

    </div>

</aside>
        
        
        </div>
        
        }

    </div>

  </div>

}



</section>
