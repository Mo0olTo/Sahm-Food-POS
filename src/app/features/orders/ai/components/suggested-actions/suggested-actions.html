<div class="flex flex-wrap gap-2">

  @for (item of actions; track item.action) {

    <button
      type="button"
      (click)="select(item.action)"
      [disabled]="loading()"
      [attr.aria-label]="item.label"
      class="inline-flex items-center gap-2 rounded-full
             border border-[var(--color-borders)]
             bg-[var(--color-hover)]
             px-3 py-1.5
             text-[11px] font-medium uppercase tracking-wide
             text-[var(--color-main-text)]
             transition-all duration-200
             hover:-translate-y-0.5
             hover:border-[var(--color-primary)]
             hover:bg-[var(--color-primary)]/10
             hover:text-[var(--color-primary)]
             disabled:cursor-not-allowed disabled:opacity-50
             disabled:hover:translate-y-0 disabled:hover:border-[var(--color-borders)]
             disabled:hover:bg-[var(--color-hover)] disabled:hover:text-[var(--color-main-text)]">

      <span class="text-sm">
        {{ item.icon }}
      </span>

      <span>
        {{ item.label }}
      </span>

    </button>

  }

</div>
