<div class="space-y-3">

  @for (card of cards; track $index) {

    <div
      class="animate-pulse rounded-lg border border-[var(--color-borders)] bg-[var(--color-bg)] p-4">

      <div
        class="mb-3 h-3 w-32 rounded bg-[var(--color-borders)]">
      </div>

      <div class="space-y-2">

        <div
          class="h-2.5 w-full rounded bg-[var(--color-borders)]">
        </div>

        <div
          class="h-2.5 w-5/6 rounded bg-[var(--color-borders)]">
        </div>

        <div
          class="h-2.5 w-2/3 rounded bg-[var(--color-borders)]">
        </div>

      </div>

    </div>

  }

</div>
