<section
  class="
    w-full
    flex flex-col gap-4
    p-4
    sm:p-6
    md:flex-row md:items-start md:justify-center md:gap-6
    lg:gap-8
  ">

  <!-- Toolbar: full-width on mobile/tablet, fixed sidebar on desktop. -->
  <app-order-toolbar
    class="
      w-full
      md:w-64 md:shrink-0 md:sticky md:top-4
      lg:w-72
    ">
  </app-order-toolbar>

  <!-- Board: takes the rest of the row on tablet+. -->
  <app-order-board class="w-full min-w-0 flex-1"></app-order-board> 


  <app-new-order
    [open]="isDrawerOpen()"
    (close)="closeDrawer()">
  </app-new-order>

</section>
