<section
  class="
    w-full
    flex flex-col gap-4
    p-4
    sm:p-6
    xl:flex-row xl:items-start xl:justify-center xl:gap-6
    lg:gap-8
  ">

  <!-- Toolbar: full-width on mobile/tablet, fixed sidebar on desktop. -->
  <app-order-toolbar
    class="
      w-full
      xl:w-64 xl:shrink-0 xl:sticky xl:top-4
      lg:w-72
    ">
  </app-order-toolbar>

  <!-- Board: takes the rest of the row on tablet+. -->
  <app-order-board class="w-full min-w-0 flex-1"></app-order-board>

</section>
