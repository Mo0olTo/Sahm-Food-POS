<section
  class="min-h-0 overflow-hidden rounded-xl border border-[var(--color-borders)] bg-[var(--color-section-bg)] p-6">

  @if (order()) {

    <div class="space-y-6">

      <!-- Header -->
      <div>
        <p class="text-sm uppercase tracking-wider text-[var(--color-sec-text)]">
          Order
        </p>

        <h2 class="mt-1 text-3xl font-bold text-[var(--color-primary)]">
          {{ order()!.orderNumber }}
        </h2>

        <p class="mt-2 text-lg font-medium text-[var(--color-main-text)]">
          {{ order()!.customerName }}
        </p>
      </div>

      <!-- Status -->
      <div class="border-t border-[var(--color-borders)] pt-5">
        <p class="mb-3 text-sm font-medium uppercase tracking-wide text-[var(--color-sec-text)]">
          Status
        </p>

        <app-status-badge
          [status]="order()!.status">
        </app-status-badge>
      </div>

      <!-- Items -->
      <div class="border-t border-[var(--color-borders)] pt-5">
        <h4 class="mb-4 text-sm font-semibold uppercase tracking-wide text-[var(--color-sec-text)]">
          Items
        </h4>

        <ul class="space-y-3">
          @for (item of order()?.items; track item.name) {

            <li
              class="flex items-center justify-between rounded-lg border border-[var(--color-borders)] bg-[var(--color-bg)] px-4 py-3">

              <span class="font-medium text-[var(--color-main-text)]">
                {{ item.name }}
              </span>

              <span
                class="rounded-md bg-[var(--color-primary)] px-3 py-1 text-sm font-bold text-black">
                ×{{ item.quantity }}
              </span>

            </li>

          }
        </ul>
      </div>

      <!-- AI Assistant -->
      <div
        class="w-full border-t border-[var(--color-borders)] pt-6">

        <app-ai-chat
          class="block w-full"
          [order]="order()!">
        </app-ai-chat>

      </div>

    </div>

  } @else {

    <div
      class="flex h-full items-center justify-center text-lg text-[var(--color-sec-text)]">

      Select an order

    </div>

  }

</section>
