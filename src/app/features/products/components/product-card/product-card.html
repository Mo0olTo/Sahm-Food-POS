<article
  class="
    flex cursor-pointer items-center justify-between
    rounded-xl
    border border-[var(--color-borders)]
    bg-[var(--color-section-bg)]
    px-4 py-3
    transition
    hover:border-[var(--color-primary)]
    hover:bg-[var(--color-bg)]
  "
  (click)="addProduct()"
>


  <!-- Product Info -->

  <div class="flex items-center gap-3">


    <div
      class="
        flex h-10 w-10 items-center justify-center
        rounded-lg
        bg-[var(--color-primary)]/10
        text-[var(--color-primary)]
      "
    >

      <i class="pi pi-box"></i>

    </div>



    <div>


      <h3
        class="
        font-semibold
        text-[var(--color-main-text)]
        "
      >
        {{ product().name }}
      </h3>



      <div class="flex items-center gap-2">


        <span
          class="
          text-xs
          text-[var(--color-sec-text)]
          "
        >
          {{ product().category }}
        </span>



        @if(product().description){

          <span
            class="
            text-xs
            text-[var(--color-sec-text)]
            "
          >
            • {{ product().description }}
          </span>

        }


      </div>


    </div>


  </div>





  <!-- Price + Action -->


  <div class="flex items-center gap-4">


    <span
      class="
      font-bold
      text-[var(--color-primary)]
      "
    >
      {{ product().price }} EGP
    </span>



    <button
      type="button"
      class="
      rounded-lg
      bg-[var(--color-primary)]
      px-3 py-1.5
      text-sm
      font-semibold
      text-white
      transition
      hover:brightness-110 
      cursor-pointer
      "
      (click)="$event.stopPropagation(); addProduct()"
    >

      Add

    </button>


  </div>



</article>
