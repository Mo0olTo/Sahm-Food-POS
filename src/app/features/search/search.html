<div class="search-host">

  <app-search-input
    (focusChange)="onFocusChange($event)"
    (navigate)="onNavigate($event)"
    (submit)="onSubmit($event)">
  </app-search-input>

  @if (isOpen()) {

    <div
      class="search-dropdown"
      role="dialog"
      aria-label="Search results">

      <app-search-results
        (productSelected)="onProductSelected($event)">
      </app-search-results>

    </div>

  }

</div>
