@if (variant() === 'compact') {

    <div class="flex items-center gap-3">
    
        <i
            class="pi text-xl"
            [class]="recommendation().icon + ' ' + recommendation().color">
        </i>
    
        <span
            class="text-sm font-medium text-[var(--color-main-text)]">
            {{ recommendation().shortMessage }}
        </span>
    
    </div>
    
    } @else {
    
    <section
        class="rounded-xl border border-[var(--color-borders)] bg-[var(--color-section-bg)] p-5">
    
        <div class="flex items-start gap-4">
    
            <div
                class="flex h-12 w-12 items-center justify-center rounded-full bg-[var(--color-bg)]">
    
                <i
                    class="pi text-2xl"
                    [class]="recommendation().icon + ' ' + recommendation().color">
                </i>
    
            </div>
    
            <div class="flex-1">
    
                <h3 class="text-lg font-semibold text-[var(--color-main-text)]">
                    {{ recommendation().title }}
                </h3>
    
                <p class="mt-2 text-sm text-[var(--color-sec-text)]">
                    {{ recommendation().description }}
                </p>
    
                <ul class="mt-4 space-y-2">
    
                    @for (action of recommendation().actions; track action) {
    
                    <li class="flex items-center gap-2 text-sm text-[var(--color-main-text)]">
    
                        <i class="pi pi-check text-xs text-emerald-400"></i>
    
                        {{ action }}
    
                    </li>
    
                    }
    
                </ul>
    
            </div>
    
        </div>
    
    </section>
    
    }
