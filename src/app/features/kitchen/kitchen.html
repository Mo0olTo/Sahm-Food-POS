<section>

  @if (loading()) {

    <app-skeleton
    [rows]="8"
    ></app-skeleton>

} @else if (error()) {

    <app-error-state
        (retry)="reload()">
    </app-error-state>

} @else {
  <div class="space-y-5">

    <app-workload-gauge
      [kitchen]="kitchen()">
    </app-workload-gauge>


    <app-workload-summary
      [kitchen]="kitchen()">
    </app-workload-summary>

  </div>

}
</section>
